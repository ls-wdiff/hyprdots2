bindd = $mainMod SHIFT, 6, Move To Context 6, exec, $ws_script movetoworkspace 6
bindd = $mainMod SHIFT, 7, Move To Context 7, exec, $ws_script movetoworkspace 7
bindd = $mainMod SHIFT, 8, Move To Context 8, exec, $ws_script movetoworkspace 8
bindd = $mainMod SHIFT, 9, Move To Context 9, exec, $ws_script movetoworkspace 9
bindd = $mainMod SHIFT, 0, Move To Context 10, exec, $ws_script movetoworkspace 10

# -- Move Window Silently (Context Relative) --
bindd = $mainMod ALT, 1, Silent Move To Context 1, exec, $ws_script movetoworkspacesilent 1
bindd = $mainMod ALT, 2, Silent Move To Context 2, exec, $ws_script movetoworkspacesilent 2
bindd = $mainMod ALT, 3, Silent Move To Context 3, exec, $ws_script movetoworkspacesilent 3
