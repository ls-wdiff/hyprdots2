bindd = $mainMod, 7, Switch To Context 7, exec, $ws_script workspace 7
bindd = $mainMod, 8, Switch To Context 8, exec, $ws_script workspace 8
bindd = $mainMod, 9, Switch To Context 9, exec, $ws_script workspace 9
bindd = $mainMod, 0, Switch To Context 10, exec, $ws_script workspace 10

# -- Move Active Window to Workspace (Context Relative) --
bindd = $mainMod SHIFT, 1, Move To Context 1, exec, $ws_script movetoworkspace 1
