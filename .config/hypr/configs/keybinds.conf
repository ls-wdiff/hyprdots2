# Adjusted description for conciseness:
bindld = $mainMod ALT, D, Clear Screen Notifications, exec, swaync-client --hide-all

# -------------------------------------------------------------------------------------------------
# 4. WINDOW MANAGEMENT
# -------------------------------------------------------------------------------------------------
bindd = $mainMod, Q, Close Window, killactive,
bindd = $mainMod SHIFT, F, Window Fullscreen, fullscreen, 0
bindd = $mainMod, F, Window Maximize, fullscreen, 1
bindd = $mainMod, X, Pin Window, pin
bindd = $mainMod, Y, Toggle Window Split, layoutmsg, togglesplit
bindd = $mainMod SHIFT, Y, Toggle Pseudo, pseudo,

# Smart Float: Toggle float -> Resize to 90% -> Center
bindd = $mainMod, SPACE, Toggle Float, exec, if hyprctl -j activewindow | jq -e '.floating | not'; then hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 90% 90%; dispatch centerwindow"; else hyprctl dispatch togglefloating; fi

# CHANGED: 'bindd' -> 'binded' (Enable 'repeat' flag so you can hold the key)
# --- Focus Movement ---
binded = $mainMod, left, Focus Left, movefocus, l
binded = $mainMod, right, Focus Right, movefocus, r
binded = $mainMod, up, Focus Up, movefocus, u
binded = $mainMod, down, Focus Down, movefocus, d

# CHANGED: 'bindd' -> 'binded' (Enable 'repeat' flag so you can hold the key)
# --- Window Movement ---
binded = $mainMod SHIFT, left, Move Left, movewindow, l
binded = $mainMod SHIFT, right, Move Right, movewindow, r
binded = $mainMod SHIFT, up, Move Up, movewindow, u
binded = $mainMod SHIFT, down, Move Down, movewindow, d

# --- Window Resizing (Fixed) ---
# CHANGED: 'bindd' -> 'binded' (Enable 'repeat' flag so you can hold the key)
binded = $mainMod, right, Resize Width +, resizeactive, 30 0
binded = $mainMod, left, Resize Width -, resizeactive, -30 0
binded = $mainMod, up, Resize Height -, resizeactive, 0 -30
binded = $mainMod, down, Resize Height +, resizeactive, 0 30

