bindld = $mainMod ALT, period, Toggle Hyprland Visuals, exec, uwsm-app -- ~/user_scripts/hypr/hypr_blur_opacity_shadow_toggle.sh
# Per-window opacity toggle (setprop)
#bindld = $mainMod, period, Toggle Opacity, setprop, activewindow opaque toggle
# Per-window blur toggle (setprop)
#bindld = $mainMod, comma, Toggle Blur, setprop, activewindow no_blur toggle

# --- Hyprland Animations ---
bindd = $mainMod ALT, A, Hyprland Animation Rofi Menu, exec, uwsm-app -- pkill rofi; rofi -show animations -modi "animations:~/user_scripts/rofi/hypr_anim.sh"

