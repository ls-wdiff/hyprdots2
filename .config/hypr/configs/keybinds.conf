# Path shortcut for cleaner config
$scripts     = $HOME/.config/hypr/scripts


$mainMod = SUPER

# 2. APPLICATION LAUNCHERS (UWSM Wrapped)
# Wrapping main apps in 'uwsm-app --' ensures they are tracked by systemd properly.

bindd = $mainMod, RETURN, Launch Terminal, exec, uwsm-app -- $terminal
bindd = $mainMod, W, Launch Browser, exec, uwsm-app -- $browser
bindd = $mainMod, E, File Manager, exec, uwsm-app -- $terminal -e $fileManager

bindd = SUPER, D, Launch Menu for Apps, exec, pkill rofi; rofi -show drun -run-command "uwsm app -- {cmd}"
#bindd = $mainMod CTRL SHIFT, SPACE, Calculator, exec, uwsm-app -- pkill rofi; ~/user_scripts/rofi/calculator.sh
bindd = SUPER ALT, T, Matugen Theme Config, exec, uwsm-app -- pkill rofi; ~/user_scripts/rofi/rofi_theme.sh
#bindd = CTRL, SPACE, Rofi Wallpaper Selector, exec, uwsm-app -- pkill rofi; ~/user_scripts/rofi/rofi_wallpaper_selctor.sh
bindd = SUPER SHIFT, T, Waypaper Wallpaper Selector, exec, uwsm-app -- waypaper
#bindd = CTRL ALT, SPACE, UWSM uuctl - display active user units, exec, uwsm-app -- pkill rofi; uuctl

# Rofi Powermenu
bindd = SUPER, M, Power Menu, exec, uwsm-app -- pkill rofi; rofi -show power-menu -modi power-menu:~/user_scripts/rofi/powermenu.sh

# System Monitor (htop)
bindd = CTRL SHIFT, escape, System Monitor, exec, uwsm-app -- $terminal --class dgop -e dgop

# --- System Utilities ---
#bindd = ALT, 1, Wi-Fi Manager, exec, uwsm-app -- $terminal --class wifitui -e wifitui
#bindd = ALT, 2, Bluetooth Manager, exec, uwsm-app -- blueman-manager
#bindd = ALT, 3, Audio Mixer, exec, uwsm-app -- pavucontrol
#bindd = ALT, 4, Wallpaper App, exec, uwsm-app -- waypaper

bindd = SUPER, T, Cycle Next Wallpaper, exec, uwsm-app -- ~/.config/hypr/scripts/theme_matugen/theme_ctl.sh next

#===
# ---Passthrough/ disabling all keybinds temperarily---
# 1. Global bind to ENTER the submap
#bindd = ALT, 6, Enable Passthrough (Disable Keybinds), submap, passthrough

# 2. Start of the 'passthrough' submap
#submap = passthrough

# 3. Bind to EXIT the submap (Only active while in this mode)
#bindd = ALT, 6, Disable Passthrough (Enable Keybinds), submap, reset

# 4. End of the submap (Return to global scope for subsequent config lines)
#submap = reset

# ---Passthrough/ disabling all keybinds temperarily---
# 1. Global bind to ENTER the submap
# We use 'exec' to chain the notification and the dispatcher manually.
# '-u critical' ensures the notification is visible even if you are in a fullscreen game/VM.
bindld = ALT, 6, Disable Game Mode (Disable Keybinds), exec, notify-send -u critical -t 3000 "Passthrough Enabled" "Press ALT+6 to exit"; hyprctl dispatch submap passthrough

# 2. Start of the 'passthrough' submap
submap = passthrough

# 3. Bind to EXIT the submap (Only active while in this mode)
bindld = ALT, 6, Game Mode (Enable Keybinds), exec, notify-send -u low -t 2000 "Passthrough Disabled" "Keybinds restored"; hyprctl dispatch submap reset

# 4. End of the submap (Return to global scope)
submap = reset

# Waybar Toggle
#bindd = ALT, 9, Start Waybar for 1 Min, exec, uwsm-app -- ~/user_scripts/waybar/waybar_autostart.sh
#bindld = ALT, 0, Kill Waybar, exec, pkill waybar
#bindd = $mainMod ALT, W, Waybar Swap Configs, exec, uwsm-app -- ~/user_scripts/waybar/dusky_waybars.sh --toggle
#bindd = $mainMod ALT SHIFT, W, Waybar Swap Configs, exec, uwsm-app -- ~/user_scripts/waybar/dusky_waybars.sh --back_toggle

# wlogout
bindd = ALT, F4, Logout Menu, exec, uwsm-app -- ~/.config/hypr/scripts/wlogout/wlogout_scale.sh

# Hyprland Reload
bindld = SUPER SHIFT, R, Reload Hyprland, exec, hyprctl reload

# --- Sliders (Hyprsunset, Volume, Brightness) ---
bindd = SUPER, V, Volume/Brightness & Nightlight Slider, exec, gdbus call --session --dest org.dusky.sliders --object-path /org/dusky/sliders --method org.freedesktop.Application.Activate "{}"

