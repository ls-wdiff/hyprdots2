# -- Variables --
$ws_script = ~/user_scripts/hypr/multi_monitor_workspace.sh

# -- Switch to Workspace (Context Relative) --
bindd = $mainMod, 1, Switch To Context 1, exec, $ws_script workspace 1
bindd = $mainMod, 2, Switch To Context 2, exec, $ws_script workspace 2
bindd = $mainMod, 3, Switch To Context 3, exec, $ws_script workspace 3
bindd = $mainMod, 4, Switch To Context 4, exec, $ws_script workspace 4
bindd = $mainMod, 5, Switch To Context 5, exec, $ws_script workspace 5
