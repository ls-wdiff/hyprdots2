# 3. CUSTOM SCRIPTS & UTILITIES
# -------------------------------------------------------------------------------------------------

# Display Scale Adjustment
bindled = $mainMod ALT, equal, Scale Up, exec, uwsm-app -- ~/user_scripts/hypr/adjust_scale.py +
bindled = $mainMod ALT, minus, Scale Down, exec, uwsm-app -- ~/user_scripts/hypr/adjust_scale.py -

# Performance: Process Terminator
bindd = $mainMod SHIFT, Q, Kill Process, exec, uwsm-app -- $terminal --class performance.sh -e ~/user_scripts/performance/services_and_process_terminator.sh


# --- Opacity & Blur Toggles ---
